envVarGroups:
  - name: agentpulse-env
    envVars:
      - key: SUPABASE_URL
      - key: SUPABASE_KEY
      - key: GROQ_API_KEY
      - key: SUPABASE_DB_URL
      - key: OPENROUTER_API_KEY
      - key: TAVILY_API_KEY

services:
  # 1. Backend Service
  - type: web
    name: agentpulse-backend
    plan: free
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - fromGroup: agentpulse-env
      - key: RUNNING_IN_DOCKER
        value: "false"

  # 2. Agentic RAG Service
  - type: web
    name: agentpulse-agentic-rag
    plan: free
    env: docker
    dockerContext: ./agents/agentic_rag
    dockerfilePath: ./agents/agentic_rag/Dockerfile
    envVars:
      - fromGroup: agentpulse-env

  # 3. Autonomous RAG Service
  - type: web
    name: agentpulse-autonomous-rag
    plan: free
    env: docker
    dockerContext: ./agents/autonomous_rag
    dockerfilePath: ./agents/autonomous_rag/Dockerfile
    envVars:
      - fromGroup: agentpulse-env

  # 4. Corrective RAG Service
  - type: web
    name: agentpulse-corrective-rag
    plan: free
    env: docker
    dockerContext: ./agents/corrective_rag
    dockerfilePath: ./agents/corrective_rag/Dockerfile
    envVars:
      - fromGroup: agentpulse-env
